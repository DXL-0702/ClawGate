# ClawGate 开发 / 源码构建版
#
# 从本地源码构建 ClawGate 三个服务，用于开发调试。
# 生产环境推荐使用 docker-compose.prod.yml（拉取官方镜像，启动更快）。
#
# 启动：docker compose up -d --build
# 停止：docker compose down
# 日志：docker compose logs -f server

services:
  redis:
    image: redis:7-alpine
    container_name: clawgate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: clawgate-qdrant
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: clawgate-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (uncomment if available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── ClawGate 服务（本地构建） ───────────────────────────────
  router:
    build:
      context: ./services/router-rust
      dockerfile: Dockerfile
    container_name: clawgate-router
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - INTENT_URL=http://intent:8000

  intent:
    build:
      context: ./services/intent-python
      dockerfile: Dockerfile
    container_name: clawgate-intent
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: clawgate-server
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      router:
        condition: service_started
      intent:
        condition: service_started
    environment:
      - CLAWGATE_REQUIRE_OPENCLAW=${CLAWGATE_REQUIRE_OPENCLAW:-false}
      - REDIS_URL=redis://redis:6379
      - ROUTER_URL=http://router:3001
      - OLLAMA_URL=http://ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - clawgate_data:/app/data

volumes:
  redis_data:
  qdrant_data:
  ollama_data:
  clawgate_data:
